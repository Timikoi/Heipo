<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>HeipoAI – Orq</title>
    <style>
        body {
            background: #0a0a0f;
            color: #00eaff;
            font-family: "Consolas", monospace;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background: #11111a;
            padding: 20px;
            text-align: center;
            font-size: 28px;
            letter-spacing: 3px;
            border-bottom: 2px solid #00eaff;
        }

        #console {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-size: 18px;
            line-height: 1.5;
        }

        #inputZone {
            display: flex;
            padding: 15px;
            background: #11111a;
            border-top: 2px solid #00eaff;
        }

        #userInput {
            flex: 1;
            padding: 10px;
            background: #0f0f17;
            border: 1px solid #00eaff;
            color: #00eaff;
            font-size: 18px;
        }

        #sendBtn {
            padding: 10px 20px;
            margin-left: 10px;
            background: #00eaff;
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        #sendBtn:hover {
            background: #00bcd4;
        }
    </style>
</head>

<body>

<header>HEIPOAI : ORQ</header>

<div id="console">
    <p><strong>Orq :</strong> Système initialisé. En attente d’une commande Heipo…</p>
</div>

<div id="inputZone">
    <input type="text" id="userInput" placeholder="Écris une commande pour Orq…">
    <button id="sendBtn">Envoyer</button>
</div>

<script>
    const consoleDiv = document.getElementById("console");
    const input = document.getElementById("userInput");
    const btn = document.getElementById("sendBtn");

    function sendToOrq() {
        const text = input.value.trim();
        if (text === "") return;

        consoleDiv.innerHTML += `<p><strong>Toi :</strong> ${text}</p>`;

        // Réponse simulée d'Orq
        let response = "Analyse en cours…";

        if (text.toLowerCase().includes("bonjour")) {
            response = "Bonjour humain. Je suis Orq, l’IA du Heipo Empire.";
        } else if (text.toLowerCase().includes("heipocod")) {
            response = "HeipoCod HEX détecté. Conversion possible.";
        } else if (text.toLowerCase().includes("orq")) {
            response = "Je suis opérationnel.";
        }

        consoleDiv.innerHTML += `<p><strong>Orq :</strong> ${response}</p>`;
        consoleDiv.scrollTop = consoleDiv.scrollHeight;

        input.value = "";
    }

    btn.onclick = sendToOrq;
    input.addEventListener("keydown", e => {
        if (e.key === "Enter") sendToOrq();
    });
</script>

</body>
</html>
